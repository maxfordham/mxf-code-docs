[workspace]
authors = ["jgunstone <j.gunstone@maxfordham.com>"]
channels = ["conda-forge"]
name = "building-code"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
jlab = "jupyter lab"
render = "quarto render ."
preview = "quarto preview ."
open = { cmd = "/mnt/c/windows/explorer.exe index.html", cwd = "_site"} # this will only work on WSL

[dependencies]
quarto = ">=1.7,<2"
jupyterlab = ">=4.4.0,<5"
itables = ">=2.7.3,<3"
pandas = ">=3.0.2,<4"
jupytext = ">=1.19.1,<2"

[pypi-dependencies]
jupyterlab-quarto = ">=0.3.5, <0.4"
